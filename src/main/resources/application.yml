spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/sistema_db
    driver-class-name: org.postgresql.Driver
    username: sistema
    password: sistema123

  h2:
    console:
      enabled: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: minha-chave-super-segura-para-jwt-com-mais-de-64-caracteres-1234567890
    expiration-ms: 86400000
  storage:
    upload-dir: uploads
    public-base-url: http://44.197.214.181:8080
    s3-enabled: false
    s3-bucket: marketplace-images
    s3-region: sa-east-1